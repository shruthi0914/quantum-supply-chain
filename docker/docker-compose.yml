version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: olist_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/olist_db
      - LLM_MODEL=gpt-4o
    ports:
      - "8000:8000"
    depends_on:
      - db
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000

  ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      - API_URL=http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api
    command: streamlit run ui/app.py --server.port 8501 --server.address 0.0.0.0

volumes:
  postgres_data:
